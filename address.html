<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethereum Wallet Analysis | cryptoucan.xyz</title>
<meta name="description" content="Analyze any Ethereum wallet address instantly. See ETH balance, token holdings, transaction history in plain English, wallet age and activity status — free, no sign-up.">
<meta name="robots" content="index, follow">
<link rel="canonical" id="canonical-url" href="https://cryptoucan.xyz/address/">
<meta property="og:site_name" content="cryptoucan.xyz">
<meta property="og:type" content="website">
<meta id="og-title" property="og:title" content="Ethereum Wallet Analysis | cryptoucan.xyz">
<meta id="og-description" property="og:description" content="Analyze any Ethereum wallet address instantly — free, no sign-up.">
<meta id="og-url" property="og:url" content="https://cryptoucan.xyz/address/">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link id="favicon" rel="shortcut icon" href="/images/favicon_32.png" type="/image/png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon_16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon_32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/images/favicon_96.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon_192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon_180.png">
<style>
  :root {
    --bg:        #0a0f1e;
    --glass:     rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --glass-hover:  rgba(255,255,255,0.07);
    --grad1:     #4f8aff;
    --grad2:     #a855f7;
    --text:      #e8edf8;
    --muted:     #cbd5e8;
    --muted2:    #b0bfcf;
    --green:     #34d399;
    --red:       #f87171;
    --yellow:    #fbbf24;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-orb {
    position: fixed; border-radius: 50%;
    filter: blur(120px); opacity: 0.10;
    pointer-events: none; z-index: 0;
    will-change: transform; transform: translateZ(0);
  }
  .bg-orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #4f8aff, transparent); top: -150px; left: -100px; }
  .bg-orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #a855f7, transparent); top: 300px; right: -100px; }

  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 75%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 30%, rgba(255,255,255,0.3) 0%, transparent 100%);
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 660px; margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* NAV */
  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 20px; max-width: 660px; margin: 0 auto;
  }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-text {
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    background: linear-gradient(135deg, var(--grad1), var(--grad2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .nav-back {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    text-decoration: none; display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--grad1); }

  /* SECTION FADE */
  .section {
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.10s; }
  .section:nth-child(3) { animation-delay: 0.15s; }
  .section:nth-child(4) { animation-delay: 0.20s; }
  .section:nth-child(5) { animation-delay: 0.25s; }
  .section:nth-child(6) { animation-delay: 0.30s; }
  .section:nth-child(7) { animation-delay: 0.35s; }

  /* CARD */
  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 24px;
  }

  /* CARD TITLE */
  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .card-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--glass-border), transparent);
  }

  /* ADDRESS HEADER */
  .addr-header { margin-bottom: 16px; }
  .ens-name {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--grad1), var(--grad2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px;
  }
  .addr-full {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    word-break: break-all; line-height: 1.5;
  }

  /* SNAPSHOT GRID */
  .snap-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 520px) { .snap-grid { grid-template-columns: 1fr 1fr; } }
  .snap-item {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 16px;
  }
  .snap-label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted2); margin-bottom: 8px;
  }
  .snap-value {
    font-family: var(--mono); font-size: 18px; font-weight: 700;
    color: var(--text); margin-bottom: 4px;
  }
  .snap-value.grad {
    background: linear-gradient(135deg, var(--grad1), var(--grad2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .snap-sub { font-size: 11px; color: var(--muted); font-weight: 300; }

  /* BADGE */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em;
  }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
  .badge-dormant { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .badge-dormant::before { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .badge-active  { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
  .badge-active::before  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .badge-moderate { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
  .badge-moderate::before { background: var(--yellow); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* ASSET BARS */
  .asset-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .asset-tag {
    display: flex; flex-direction: column; gap: 3px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--glass-border);
    border-radius: 10px; padding: 10px 14px;
    min-width: 80px;
  }
  .asset-tag-sym {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    color: var(--text);
  }
  .asset-tag-val {
    font-family: var(--mono); font-size: 11px;
    color: var(--muted2);
  }
  .asset-tag-eth { border-color: rgba(79,138,255,0.25); background: rgba(79,138,255,0.06); }
  .asset-tag-eth .asset-tag-sym { color: #7cb9ff; }

  /* TX LIST */
  .tx-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .tx-item:last-child { border-bottom: none; padding-bottom: 0; }
  .tx-icon {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .tx-icon.in  { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.15); }
  .tx-icon.out { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.15); }
  .tx-icon.contract { background: rgba(79,138,255,0.1); border: 1px solid rgba(79,138,255,0.15); }
  .tx-body { flex: 1; }
  .tx-desc { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 3px; font-weight: 400; }
  .tx-meta { font-family: var(--mono); font-size: 10px; color: var(--muted2); }
  .tx-amount { font-family: var(--mono); font-size: 12px; text-align: right; flex-shrink: 0; }
  .tx-amount.in  { color: var(--green); }
  .tx-amount.out { color: var(--red); }

  /* BUTTONS */
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--grad1), var(--grad2));
    border: none; border-radius: 14px;
    padding: 13px;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    color: #fff; cursor: pointer;
    letter-spacing: 0.04em;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(79,138,255,0.25);
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(79,138,255,0.35); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary.copied { background: linear-gradient(135deg, #34d399, #059669); box-shadow: 0 4px 20px rgba(52,211,153,0.25); }

  .btn-secondary {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px; padding: 13px;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(12px);
  }
  .btn-secondary:hover { background: var(--glass-hover); border-color: rgba(79,138,255,0.3); }

  .share-row { display: flex; gap: 10px; }

  /* SEARCH AGAIN */
  .search-again {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 6px 6px 6px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .search-again input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: var(--mono); font-size: 12px; color: var(--text);
    padding: 8px 0;
  }
  .search-again input::placeholder { color: var(--muted2); }

  /* AD SLOT */
  .ad-slot {
    background: var(--glass);
    border: 1px dashed var(--muted2);
    border-radius: 12px; padding: 16px;
    text-align: center;
    font-family: var(--mono); font-size: 10px;
    color: var(--muted2); letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* OTHERS TOKEN */
  .others-row {
    margin-top: 12px;
    font-family: var(--mono); font-size: 11px; color: var(--muted2);
    line-height: 1.7;
  }
  .last-updated {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 11px; color: var(--muted2);
    margin-top: 10px;
  }
  .refresh-btn {
    font-family: var(--mono); font-size: 11px;
    color: var(--grad1); cursor: pointer;
    background: none; border: 1px solid rgba(79,138,255,0.3);
    border-radius: 6px; padding: 3px 10px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { background: rgba(79,138,255,0.1); }
  .refresh-btn:disabled { color: var(--muted2); border-color: var(--glass-border); cursor: not-allowed; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="stars"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<!-- NAV -->
<nav>
  <a href="/" class="logo" style="display:flex;align-items:center;gap:8px;">
    <img src="/images/favicon.png" style="width:24px;height:24px;object-fit:contain;" alt="cryptoucan logo">
    <span class="logo-text">cryptoucan.xyz</span>
  </a>
  <a href="/" class="nav-back">← New scan</a>
</nav>

<div class="wrap" id="main-content">
  </footer>

</div>
<script>
const WORKER = 'https://cryptoucan-api.winqi.workers.dev';

// ── Helpers ──────────────────────────────────────────────────
function shortAddr(addr) {
  return addr.slice(0, 6) + '…' + addr.slice(-4);
}
function fmtETH(val) {
  if (val === 0) return '0 ETH';
  if (val < 0.0001) return '< 0.0001 ETH';
  const n = val >= 1000
    ? val.toLocaleString('en-US', { maximumFractionDigits: 2 })
    : val.toFixed(4);
  return n + ' ETH';
}
function fmtUSD(val) {
  if (!val || val === 0) return '$0';
  const fmt = n => n.toLocaleString('en-US', { maximumFractionDigits: 2 });
  if (val >= 1000000) return '$' + fmt(val / 1000000) + 'M';
  if (val >= 1000) return '$' + fmt(val / 1000) + 'K';
  return '$' + fmt(val);
}
function timeAgo(isoDate) {
  if (!isoDate) return '—';
  const diff = (Date.now() - new Date(isoDate)) / 1000;
  const d = Math.floor(diff / 86400);
  const y = Math.floor(d / 365);
  const m = Math.floor((d % 365) / 30);
  if (y > 0) return y + ' yr' + (y > 1 ? 's' : '') + (m > 0 ? ' ' + m + ' mo' : '') + ' ago';
  if (d > 30) return m + ' mo ago';
  if (d > 0) return d + ' day' + (d > 1 ? 's' : '') + ' ago';
  return 'Today';
}
function sinceDate(isoDate) {
  if (!isoDate) return '—';
  const d = new Date(isoDate);
  return 'Since ' + d.toLocaleDateString('en-US', { month: 'short', year: 'numeric', day: 'numeric' });
}
function fmtAge(days) {
  if (!days) return '—';
  const y = Math.floor(days / 365);
  const m = Math.floor((days % 365) / 30);
  if (y > 0) return y + ' yr' + (y > 1 ? 's' : '') + (m > 0 ? ' ' + m + ' mo' : '');
  if (m > 0) return m + ' mo';
  return days + ' days';
}
function txIcon(type) {
  if (type === 'in') return '⬇️';
  if (type === 'out') return '⬆️';
  if (type === 'failed') return '✕';
  return '⚡';
}
function txIconClass(type) {
  if (type === 'in') return 'in';
  if (type === 'out') return 'out';
  return 'contract';
}
function txAmountStr(tx) {
  if (tx.ethValue && tx.ethValue > 0.00001) {
    const sign = tx.type === 'in' ? '+' : tx.type === 'out' ? '−' : '';
    return sign + tx.ethValue.toFixed(4) + ' ETH';
  }
  return '';
}

// ── Render error state ────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('main-content');
  el.innerHTML = '';
  const section = document.createElement('div');
  section.className = 'section';
  section.style.marginTop = '40px';
  section.innerHTML = '<div class="card" style="text-align:center;padding:48px 24px;">' +
    '<div style="font-size:40px;margin-bottom:16px;">⚠️</div>' +
    '<div style="font-family:var(--mono);font-size:16px;color:var(--text);margin-bottom:10px;">' + msg + '</div>' +
    '<div style="font-size:13px;color:var(--muted);margin-bottom:24px;">Double-check the address and try again.</div>' +
    '<div class="search-again" style="max-width:420px;margin:0 auto;">' +
    '<span style="color:var(--muted2);font-size:13px;">⬡</span>' +
    '<input type="text" id="errorInput" placeholder="0x... or ENS name" />' +
    '<button class="btn-secondary" style="flex:none;padding:10px 18px;font-size:12px;" id="errorScanBtn">Scan →</button>' +
    '</div></div>';
  el.appendChild(section);
  function doScan() {
    const v = document.getElementById('errorInput').value.trim();
    if (v) window.location.href = '/address/' + v.toLowerCase();
  }
  document.getElementById('errorScanBtn').addEventListener('click', doScan);
  document.getElementById('errorInput').addEventListener('keydown', e => { if (e.key === 'Enter') doScan(); });
}

function showLoading(address) {
  document.title = shortAddr(address) + ' | CryptoToucan';
  document.getElementById('main-content').innerHTML = `
    <div class="section">
      <div class="addr-header">
        <div class="ens-name" style="font-size:14px; color:var(--muted);">Loading…</div>
        <div class="addr-full">${address}</div>
      </div>
    </div>
    <div class="section">
      <div class="card">
        <div class="card-title">📊 Wallet Snapshot</div>
        <div class="snap-grid">
          ${['Total Value','Wallet Age','Last Active','Transactions'].map(l => `
          <div class="snap-item">
            <div class="snap-label">${l}</div>
            <div class="snap-value" style="background:var(--glass-border);border-radius:6px;height:28px;width:80%;animation:shimmer 1.4s infinite;"></div>
            <div class="snap-sub" style="background:var(--glass-border);border-radius:4px;height:14px;width:60%;margin-top:8px;animation:shimmer 1.4s infinite;"></div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function render(data) {
  const addr = data.address;
  const displayName = data.ensName || shortAddr(addr);

  // Last updated bar — use D1 timestamp if available
  const updatedAt = data._updatedAt || window._updatedAt || Date.now();
  window._updatedAt = updatedAt;
  const ageMs = Date.now() - updatedAt;
  const ageMins = Math.floor(ageMs / 60000);
  const ageHours = Math.floor(ageMs / 3600000);
  const ageText = ageMs < 60000 ? 'just now'
    : ageMins < 60 ? ageMins + ' min' + (ageMins > 1 ? 's' : '') + ' ago'
    : ageHours + ' hr' + (ageHours > 1 ? 's' : '') + ' ago';
  const canRefresh = ageMs > 5 * 60 * 1000; // 5 min cooldown

  // Update SEO with resolved ENS name if available
  const seoName = data.ensName || (addr.slice(0, 6) + '...' + addr.slice(-4));
  document.title = `${seoName} | Ethereum Wallet Analysis — cryptoucan.xyz`;
  document.getElementById('og-title')?.setAttribute('content', `${seoName} | Ethereum Wallet Analysis — cryptoucan.xyz`);
  document.getElementById('og-description')?.setAttribute('content', `ETH balance, tokens, and transaction history for ${data.ensName || addr} — analyzed by cryptoucan.xyz.`);
  const totalUSD = fmtUSD(data.ethUSD);
  const badgeClass = { active: 'badge-active', recent: 'badge-moderate', moderate: 'badge-moderate', dormant: 'badge-dormant', unknown: 'badge-dormant' }[data.activityStatus] || 'badge-dormant';
  const badgeLabel = { active: 'Active', recent: 'Recent', moderate: 'Moderate', dormant: 'Dormant', unknown: 'Unknown' }[data.activityStatus] || '—';

  // Sent vs Received (from recent txs)
  const sentCount = data.transactions.filter(tx => tx.type === 'out' || tx.type === 'contract').length;
  const receivedCount = data.transactions.filter(tx => tx.type === 'in').length;

  // Avg Gas per Tx
  const txsWithGas = data.transactions.filter(tx => tx.gasETH > 0);
  const avgGasRaw = txsWithGas.length > 0
    ? txsWithGas.reduce((sum, tx) => sum + tx.gasETH, 0) / txsWithGas.length
    : 0;
  const avgGas = avgGasRaw > 0 ? avgGasRaw.toFixed(4) + ' ETH' : '—';

  // Title
  document.title = displayName + ' Wallet Analysis | CryptoToucan';

  // Transactions HTML — filter out zero-value non-meaningful txs
  const meaningfulTxs = data.transactions.filter(tx =>
    tx.isError
    || (tx.type === 'in' && tx.ethValue > 0.001)
    || (tx.type === 'out' && tx.ethValue > 0.0001)
    || (tx.type === 'contract' && !tx.description.startsWith('Received') && !tx.description.startsWith('Sent 0.0000'))
    || ['Swapped', 'Claimed', 'Staked', 'Minted', 'Deposited', 'Withdrew', 'Removed', 'Added', 'Approved', 'Transferred'].some(k => tx.description.startsWith(k))
  );
  // If all filtered out, show a "no notable activity" message instead of raw 0-value txs
  const txList = Array.isArray(meaningfulTxs) ? meaningfulTxs : [];
  const txHTML = txList.length === 0
    ? '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">No notable transactions in recent history</div>'
    : txList.map(tx => `
      <div class="tx-item">
        <div class="tx-icon ${txIconClass(tx.type)}">${txIcon(tx.type)}</div>
        <div class="tx-body">
          <div class="tx-desc">${tx.description}</div>
          <div class="tx-meta">${timeAgo(new Date(tx.timestamp * 1000).toISOString())} · Gas: ${tx.gasETH.toFixed(4)} ETH
            · <a href="https://etherscan.io/tx/${tx.hash}" target="_blank" rel="noopener" style="color:var(--muted2);text-decoration:none;font-size:10px;">↗ Etherscan</a>
          </div>
        </div>
        <div class="tx-amount ${tx.type === 'in' ? 'in' : tx.type === 'out' ? 'out' : ''}">${txAmountStr(tx)}</div>
      </div>`).join('');

  const hasETH = data.ethBalance > 0;

  function fmtTokenBalance(n) {
    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
    if (n >= 1)   return n.toFixed(2);
    return n.toFixed(4);
  }





  let assetRows = '';

  if (hasETH) {
    assetRows += `<div class="asset-tag asset-tag-eth">

            <div class="snap-sub">${fmtETH(data.ethBalance)} · $${data.ethPrice.toFixed(0)}/ETH</div>
          </div>

            <div class="snap-label">Wallet Age</div>

          </div>

            <div class="snap-label">Last Active</div>

          </div>
          <div class="snap-item">

          </div>
          <div class="snap-item">
            <div class="snap-label">Sent vs Received</div>

    </div>

    <!-- ASSET BREAKDOWN -->

        ${data.tokenCount > 0 ? `<div style="font-family:var(--mono);font-size:11px;color:var(--muted2);margin-bottom:12px;">Total ${data.tokenCount} token${data.tokenCount > 1 ? 's' : ''} detected</div>` : ''}

    <div class="section">

    <!-- SCAN ANOTHER -->

    <!-- FOOTER -->
    <footer style="text-align:center;padding:40px 0 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:20px;">
      <p style="font-family:var(--mono);font-size:11px;color:var(--muted2);line-height:2;">
        <a href="/"><img src="/images/favicon.png" style="display:block;margin:0 auto;width:36px;height:36px;object-fit:contain;opacity:0.9;" alt="cryptoucan logo"></a>
      <a href="#" style="font-family:var(--mono);background:linear-gradient(135deg,var(--grad1),var(--grad2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;font-weight:700;">cryptoucan.xyz</a><br>
        <a href="/about" style="color:var(--muted);text-decoration:none;">About</a> &nbsp;·&nbsp;
        <a href="/contact" style="color:var(--muted);text-decoration:none;">Contact</a> &nbsp;·&nbsp;
        <a href="/privacy" style="color:var(--muted);text-decoration:none;">Privacy</a> &nbsp;·&nbsp;
        <a href="/terms" style="color:var(--muted);text-decoration:none;">Terms</a>
      </p>
      <p style="margin-top:12px;margin-bottom:12px;font-family:var(--mono);font-size:11px;color:var(--muted2);">
        Every wallet has a story.
      <div style="margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;">
        <a href="https://transparencyreport.google.com/safe-browsing/search?url=https:%2F%2Fcryptoucan.xyz" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;text-decoration:none;"><img src="https://developers.google.com/static/safe-browsing/images/SafeBrowsing_Icon.png" alt="Google Safe Browsing" style="width:18px;height:18px;opacity:0.7;"><span style="font-family:var(--mono);font-size:10px;color:var(--muted2);">Verified by Google Safe Browsing</span></a>

  // Store data for share/prompt functions
  window._walletData = data;
  if (!window._updatedAt) window._updatedAt = Date.now();
  // Populate prompt textarea
  setTimeout(() => {
    const box = document.getElementById('promptBox');
    if (box) box.textContent = buildPrompt(data);
  }, 100);

  // Animate bars
  setTimeout(() => {
    // no bar animation needed (tag layout)
  }, 300);

  // Enter key on scan input
  document.getElementById('newAddress').addEventListener('keydown', e => {
    if (e.key === 'Enter') scanNew();
  });

// ── Main ──────────────────────────────────────────────────────
async function main() {
  // Extract address from URL path: /address/0x...
  const path = window.location.pathname;
  const match = path.match(/\/address\/(.+)/);
  if (!match) { showError('No address provided.'); return; }
  const raw = decodeURIComponent(match[1]).trim().toLowerCase();
  if (!raw) { showError('No address provided.'); return; }

  // Basic client-side validation
  const isHex  = /^0x[0-9a-fA-F]{40}$/.test(raw);
  const isENS  = /\.eth$/i.test(raw);
  if (!isHex && !isENS) {
    showError('Invalid address: <code style="font-size:12px;">' + raw + '</code>');
    return;
  }

  showLoading(raw);

  // Dynamic SEO — update title/meta/canonical with actual address
  const displayRaw = raw.endsWith('.eth') ? raw : raw.slice(0, 6) + '...' + raw.slice(-4);
  document.title = `${displayRaw} | Ethereum Wallet Analysis — cryptoucan.xyz`;
  const pageUrl = `https://cryptoucan.xyz/address/${raw}`;
  document.getElementById('canonical-url')?.setAttribute('href', pageUrl);
  document.getElementById('og-url')?.setAttribute('content', pageUrl);
  document.getElementById('og-title')?.setAttribute('content', `${displayRaw} | Ethereum Wallet Analysis — cryptoucan.xyz`);
  document.getElementById('og-description')?.setAttribute('content', `View ETH balance, token holdings, and transaction history for ${raw} on cryptoucan.xyz.`);


  try {
    const res  = await fetch(`${WORKER}/api/wallet/${encodeURIComponent(raw)}`);
    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    window._walletData = data;
    window._updatedAt = data._updatedAt || Date.now();
    render(data);
  } catch (e) {
    showError('Failed to load wallet data. Please try again.');
  }
}

// ── Share / Prompt helpers ────────────────────────────────────
function buildPrompt(d) {
  return `Please analyze this Ethereum wallet:

Address: ${d.address}${d.ensName ? '\nENS: ' + d.ensName : ''}
Total Value: ~${fmtUSD(d.ethUSD)}
ETH Balance: ${fmtETH(d.ethBalance)} (${fmtUSD(d.ethUSD)})
Wallet Age: ${fmtAge(d.walletAgeDays)} (${sinceDate(d.firstTxDate)})
Last Active: ${timeAgo(d.lastTxDate)}
Total Transactions: ${d.sentTxCount ?? d.totalTxCount} sent, ${d.totalTxCount} total
Tokens Held: ${d.topTokenSymbols.join(', ') || 'None detected'}
Status: ${d.activityStatus}

Recent activity:
${d.transactions.map(tx => '- ' + tx.description + ' (' + timeAgo(new Date(tx.timestamp*1000).toISOString()) + ')').join('\n')}

Please analyze:
1. What type of user does this wallet suggest? (long-term holder, DeFi user, trader, etc.)
2. What does their activity pattern look like?
3. Any notable patterns or risks?
4. Explain in simple, non-technical language.`;
}

function refreshWallet() {
  const path = window.location.pathname;
  const match = path.match(/\/address\/(.+)/);
  if (!match) return;
  const addr = match[1];
  const WORKER = 'https://cryptoucan-api.winqi.workers.dev';

  // Show spinner overlay so user knows something is happening
  const overlay = document.createElement('div');
  overlay.id = 'refresh-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,15,30,0.6);z-index:999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);';
  overlay.innerHTML = '<div style="font-family:var(--mono);font-size:13px;color:var(--muted2);display:flex;align-items:center;gap:10px;"><span style="display:inline-block;width:16px;height:16px;border:2px solid var(--grad1);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></span>Refreshing wallet data…</div>';
  document.body.appendChild(overlay);

  fetch(WORKER + '/api/wallet/' + addr + '?refresh=1')
    .then(r => r.json())
    .then(data => {
      overlay.remove();
      if (data.error) return;
      window._walletData = data;
      window._updatedAt = data._updatedAt || Date.now();
      render(data);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    })
    .catch(() => { overlay.remove(); });
}

function copyPrompt() {
  const box = document.getElementById('promptBox');
  const text = box ? box.textContent : buildPrompt(window._walletData);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy & Ask AI'; btn.classList.remove('copied'); }, 2500);
  });
}

function shareTwitter() {
  const d = window._walletData;
  if (!d) return;
  const name = d.ensName || shortAddr(d.address);
  const text = `Just analyzed this Ethereum wallet on cryptoucan.xyz 🦜\n\n${name}\n💰 ${fmtUSD(d.ethUSD)}\n📅 ${fmtAge(d.walletAgeDays)} old · ${d.activityStatus}\n\ncryptoucan.xyz/address/${d.address}`;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    alert('Link copied!');
  });
}

function scanNew() {
  const val = document.getElementById('newAddress').value.trim();
  if (!val) return;
  window.location.href = '/address/' + val.toLowerCase();
}

// Shimmer animation
const style = document.createElement('style');
style.textContent = '@keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:0.8} }';
document.head.appendChild(style);

main();
</script>
